<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Трекер привычек</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="app">
  <header class="app-header">
    <div class="app-title">Привычки</div>
    <div class="header-meta">
      <span id="dateLabel"></span>
      <span class="dot">·</span>
      <span id="progressCount">0 из 0</span>
    </div>
    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
  </header>

  <ul id="habitList" class="habit-list"></ul>

  <div class="add-habit">
    <button id="addBtn" class="add-btn" type="button" aria-label="Добавить привычку">+ Добавить привычку</button>
    <form id="addForm" class="add-form hidden">
      <input id="addInput" class="add-input" type="text" placeholder="Название привычки" maxlength="40" autocomplete="off">
      <button type="submit" class="save-btn">Сохранить</button>
    </form>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
