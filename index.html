<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Бюджет дня</title>
<link rel="stylesheet" href="style.css?v=17">
</head>
<body>

<noscript>
  <div style="max-width:420px;margin:40px auto;padding:20px;text-align:center;font-family:sans-serif;">
    Для работы этого приложения нужен включённый JavaScript.
  </div>
</noscript>

<main class="app">
  <p class="motivation">Маленькие шаги создают <span class="motivation-highlight">большие перемены</span></p>

  <header class="app-header">
    <div class="app-title">Бюджет дня</div>
    <div class="header-meta">
      <span id="dateLabel"></span>
    </div>
  </header>

  <section id="budgetSetup" class="budget-setup">
    <p class="setup-label">Укажите дневной бюджет, чтобы начать</p>
    <form id="setupForm" class="setup-form">
      <input id="setupInput" class="setup-input" type="number" min="1" step="1" inputmode="numeric" placeholder="Например, 1000">
      <button type="submit" class="save-btn">Установить</button>
    </form>
  </section>

  <section id="mainView" class="main-view hidden">
    <div class="ring-section">
      <div class="ring-wrap">
        <svg id="ringSvg" class="ring-svg" viewBox="0 0 120 120"></svg>
        <div class="ring-center">
          <div id="ringPercent" class="ring-percent">0%</div>
          <div id="ringSub" class="ring-sub"></div>
        </div>
      </div>

      <div class="ring-side">
        <div id="savingsBadge" class="savings-badge hidden">
          <div id="savingsAmount" class="savings-amount"></div>
          <div id="savingsLabel" class="savings-label">сэкономлено за месяц</div>
        </div>

        <div class="spent-today">
          <div id="spentTodayAmount" class="spent-today-amount"></div>
          <div class="spent-today-label">потрачено за день</div>
        </div>
      </div>
    </div>

    <div class="budget-line">
      <span>Бюджет на сегодня: <b id="budgetAmount">0 ₸</b></span>
      <button id="editBudgetBtn" class="edit-budget-btn" type="button" aria-label="Изменить бюджет">✎</button>
    </div>

    <ul id="categoryList" class="category-list"></ul>

    <div class="add-item">
      <button id="addBtn" class="add-btn" type="button" aria-label="Добавить категорию">+ Добавить категорию</button>
      <form id="addForm" class="add-form hidden">
        <input id="addInput" class="add-input" type="text" placeholder="Название категории" maxlength="24" autocomplete="off">
        <button type="submit" class="save-btn">Сохранить</button>
      </form>
    </div>

    <div class="calendar">
      <div class="calendar-header">
        <button id="calPrev" class="cal-nav" type="button" aria-label="Предыдущий месяц">‹</button>
        <span id="calTitle" class="cal-title"></span>
        <button id="calNext" class="cal-nav" type="button" aria-label="Следующий месяц">›</button>
      </div>
      <div class="calendar-weekdays">
        <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </div>
  </section>
</main>

<div id="dayModal" class="day-modal hidden">
  <div id="dayModalBackdrop" class="day-modal-backdrop"></div>
  <div class="day-modal-content">
    <button id="dayModalClose" class="day-modal-close" type="button" aria-label="Закрыть">×</button>
    <div id="dayModalDate" class="day-modal-date"></div>
    <div id="dayModalSummary" class="day-modal-summary"></div>
    <ul id="dayModalList" class="day-modal-list"></ul>
  </div>
</div>

<script src="app.js?v=17"></script>
</body>
</html>
